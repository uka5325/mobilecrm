name: Reapply reservation API refactor

on:
  push:
    branches:
      - refactor/reservation-api-refactor-combined

permissions:
  contents: write

jobs:
  reapply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Revert rollback merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert -m 1 7fc6ac138630bfc50549a9a5b99095399a99766a --no-edit
          git rm .github/workflows/reapply-reservation-api-refactor.yml
          git commit -m "Remove temporary refactor reapply workflow"
          git push origin HEAD:refactor/reservation-api-refactor-combined
