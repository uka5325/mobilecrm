name: Apply reservation consistency v2

on:
  push:
    branches:
      - refactor/reservation-consistency-v2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/reservation-consistency-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply transformations
        run: python3 scripts/apply-reservation-consistency-v2.py
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-reservation-consistency-v2.py .github/workflows/apply-reservation-consistency-v2.yml
          git add -A
          git commit -m "refactor: implement reservation consistency v2"
          git push origin HEAD:refactor/reservation-consistency-v2
