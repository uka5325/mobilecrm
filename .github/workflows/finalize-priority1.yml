name: Finalize priority 1 fixes

on:
  push:
    branches:
      - claude/crm-data-consistency-uoamow
    paths:
      - .github/trigger-finalize-priority1.txt

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/crm-data-consistency-uoamow
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Apply explicit patient-choice test policy
        run: python scripts/update-patient-policy-tests.py

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - run: npm run test:rules
      - run: npm run test:storage
      - run: npm run test:api

      - name: Commit final code and remove temporary validation files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/api/reservations.test.ts
          git rm -f scripts/update-patient-policy-tests.py
          git rm -f .github/workflows/finalize-priority1.yml .github/trigger-finalize-priority1.txt
          git rm -f .github/workflows/validate-crm-branch.yml .github/trigger-crm-validation.txt crm-validation-result.txt || true
          git commit -m "test: align identity flows with explicit patient choice"
          git push origin HEAD:claude/crm-data-consistency-uoamow
