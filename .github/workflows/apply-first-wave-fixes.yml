name: Apply first-wave consistency fixes

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'claude/crm-data-consistency-uoamow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/crm-data-consistency-uoamow
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply patch
        run: python scripts/apply-first-wave-fixes.py

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - run: npm run test:api

      - name: Commit to same branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-first-wave-fixes.yml scripts/apply-first-wave-fixes.py
          git add app/api/invoices/route.ts app/api/reservation-notes/route.ts app/api/reservations/route.ts app/reservations/page.tsx components/reservations/MemoPopover.tsx components/timeline/DetailDrawer.tsx components/timeline/NoteCard.tsx components/timeline/tabs/FilesTab.tsx lib/reservationFiles.ts lib/reservationNotes.ts lib/reservations.ts tests/api/reservations.test.ts middleware.ts app/api/reservations-consistent/route.ts 2>/dev/null || true
          git commit -m "fix: complete first-wave consistency safeguards"
          git push origin HEAD:claude/crm-data-consistency-uoamow
