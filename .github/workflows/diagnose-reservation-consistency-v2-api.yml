name: Diagnose reservation consistency v2 API

on:
  push:
    branches:
      - refactor/reservation-consistency-v2
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: npm ci
      - name: API tests
        run: |
          set +e
          npm run test:api 2>&1 | tee api-test.log
          exit ${PIPESTATUS[0]}
      - name: Upload API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reservation-consistency-v2-api
          path: api-test.log
