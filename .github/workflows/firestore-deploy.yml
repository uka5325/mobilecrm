name: Deploy Firestore rules & indexes

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
  workflow_dispatch:
    inputs:
      force_delete_indexes:
        description: "firestore.indexes.json에 없는 콘솔 인덱스를 삭제(--force). 수동 실행 전용 — push 배포는 항상 비파괴적."
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Deploy firestore:rules and firestore:indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FORCE_DELETE: ${{ inputs.force_delete_indexes == true && '--force' || '' }}
        run: npx firebase-tools@15 deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive $FORCE_DELETE

      - name: Remove credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
