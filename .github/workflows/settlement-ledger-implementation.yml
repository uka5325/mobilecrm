name: Settlement ledger implementation

on:
  push:
    branches:
      - refactor/reservation-consistency-v2
    paths:
      - .github/workflows/settlement-ledger-implementation.yml

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/reservation-consistency-v2
          fetch-depth: 0

      - name: Apply settlement ledger refactor
        run: python scripts/apply-settlement-ledger-refactor.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Remove one-shot implementation helpers
        run: |
          rm scripts/apply-settlement-ledger-refactor.py
          rm .github/workflows/settlement-ledger-implementation.yml

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add settlement ledger and invoice synchronization"
          git push origin HEAD:refactor/reservation-consistency-v2
